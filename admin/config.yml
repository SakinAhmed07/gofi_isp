backend:
  name: git-gateway
  branch: main # আপনার GitHub ব্রাঞ্চের নাম

media_folder: "images/uploads" # ছবিগুলো যেখানে সেভ হবে
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "data/products" # প্রোডাক্টের তথ্য এখানে সেভ হবে
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "number" }
      - { label: "Product Image", name: "image", widget: "image" }
      - { label: "Description", name: "body", widget: "markdown" }
